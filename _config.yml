# Welcome to James O'Sullivan's Jekyll site! I've changed some stuff here.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# To preview any changes, use 'bundle exec jekyll serve --watch'

title: jamesosullivan.org
author: James O'Sullivan
email: james.osullivan@ucc.ie
description: >- # this means to ignore newlines until "baseurl:"
  The personal website of Dr James O'Sullivan, scholar and writer working at University College Cork.
baseurl: "" # the subpath of your site, e.g. /blog
url: "http://jamesosullivan.org" # the base hostname & protocol for your site, e.g. http://example.com
twitter_username: jamescosullivan
github_username:  jamesosullivan

# Build settings

theme: minima
plugins:
  - jekyll-feed

# Order of pages

header_pages:
  - index.markdown
  - publications.markdown
  - experience.markdown
  - awards.markdown
  - media.markdown
  - education.markdown

